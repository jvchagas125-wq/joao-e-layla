<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>João e Layla ❤️</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

<style>

body{
font-family:Poppins;
background:linear-gradient(135deg,#1a0a0a,#2d1515);
color:white;
overflow-x:hidden;
}

.title{
font-family:"Dancing Script";
font-size:60px;
text-align:center;
margin-top:40px;
color:#ff9ac9;
}

.gallery{
display:flex;
gap:15px;
overflow-x:auto;
padding:20px;
scroll-snap-type:x mandatory;
}

.gallery img{
width:260px;
height:360px;
object-fit:cover;
border-radius:20px;
scroll-snap-align:center;
transition:0.4s;
}

.gallery img:hover{
transform:scale(1.05);
}

.section{
max-width:900px;
margin:auto;
padding:20px;
}

.timer{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
text-align:center;
font-size:30px;
margin-top:30px;
}

.music{
margin-top:40px;
border-radius:20px;
overflow:hidden;
}

</style>

</head>

<body>

<h1 class="title">João e Layla ❤️</h1>

<div class="section">

<p style="text-align:center;font-size:18px">
"Chega um momento em que a palavra alegria muda de significado.
A minha maior alegria hoje é ter você ao meu lado."
</p>

<div class="timer">

<div>
<div id="years">0</div>
<small>anos</small>
</div>

<div>
<div id="months">0</div>
<small>meses</small>
</div>

<div>
<div id="days">0</div>
<small>dias</small>
</div>

<div>
<div id="hours">0</div>
<small>horas</small>
</div>

</div>

</div>

<div class="section">

<h2 style="text-align:center;font-size:30px;margin-bottom:10px">
📸 Nossas Fotos
</h2>

<div class="gallery">

<img src="https://i.imgur.com/TkYEkFj.jpg">
<img src="https://i.imgur.com/2w7Giid.jpg">
<img src="https://i.imgur.com/lWwLU82.jpg">
<img src="https://i.imgur.com/dUbQ1ud.jpg">
<img src="https://i.imgur.com/ngcsCnR.jpg">
<img src="https://i.imgur.com/kpaR51v.jpg">

</div>

</div>

<div class="section">

<h2 style="text-align:center;font-size:30px">
🎵 Nossa Música
</h2>

<div class="music">

<iframe id="music"
width="100%"
height="400"
src="https://drive.google.com/file/d/1NfUfUqbE1NYLCy2Qj0Hk-dykM-nnXU-1/preview"
allow="autoplay">
</iframe>

</div>

</div>

<script>

const startDate = new Date("2024-03-28T22:00:00");

function updateClock(){

const now = new Date();

let diff = now - startDate;

let seconds = Math.floor(diff/1000);
let minutes = Math.floor(seconds/60);
let hours = Math.floor(minutes/60);
let days = Math.floor(hours/24);

let years = now.getFullYear() - startDate.getFullYear();
let months = now.getMonth() - startDate.getMonth();
let remainingDays = now.getDate() - startDate.getDate();

if(remainingDays < 0){
months--;
remainingDays += 30;
}

if(months < 0){
years--;
months += 12;
}

document.getElementById("years").innerText = years;
document.getElementById("months").innerText = months;
document.getElementById("days").innerText = remainingDays;
document.getElementById("hours").innerText = hours % 24;

}

setInterval(updateClock,1000);
updateClock();


// autoplay quando tocar na tela

document.body.addEventListener("click",function(){

const iframe = document.getElementById("music");

iframe.src = iframe.src + "&autoplay=1";

},{once:true});

</script>

</body>
</html>
